services:
  trainer:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      # The container path is now dynamically injected from .env
      - ./models:${MODEL_DIR}
      - ./data:${DATA_DIR}
    env_file:
      - .env
    command: ["python", "train.py", "--no-mlflow"]

  api:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      # The container path is dynamically injected from .env
      - ./models:${MODEL_DIR}
    env_file:
      - .env
    depends_on:
      trainer:
        condition: service_completed_successfully