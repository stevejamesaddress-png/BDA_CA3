# =====================================================
# File: .github/workflows/deploy.yml
# Author: Steven James L00196960
# 
# Continuous Delivery (CD) Workflow
# 
# See README.md for the full use case and high-level architecture.
# This workflow is the Continuous Delivery part of our MLOps pipeline.
# 
# GitHub Actions is responsible for all automation.
# It builds the final API Docker image and updates the Kubernetes
# deployment when the main branch is updated with new code after a successful CI and CT.
# 
# =====================================================

name: CD - Build & Deploy API to Kubernetes

# Only run after code is safely on main
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    # linux image 
    runs-on: ubuntu-latest
    #fix premission issue preventing push to repo
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout out the latest code
        uses: actions/checkout@v4

      - name: GitHub Container Registry Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}git

      - name: Build and push the API Docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.app
          push: true
          # we will just use main always we could have used the SHA for better traceability
          # Secure Hash Algorithm as ID or some nameing convetion 
          tags: ghcr.io/${{ github.repository_owner }}/bda-ca3:main

      - name: Update Kubernetes manifest with the new image
        run: |
          echo "*** Updating k8s/deployment.yaml with latest image ***"
          sed -i "s|image:.*|image: ghcr.io/${{ github.repository_owner }}/BDA_CA3:main|g" k8s/deployment.yaml
          echo "Kubernetes manifest updated"

      - name: Commit and push the updated Kubernetes manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add k8s/deployment.yaml
          git commit -m "CD: Deploy new API image to Kubernetes (main)" || echo "No changes to commit"
          git push
          echo "Manifest committed – Argo CD will now deploy the new version"