name: CI - Test & Quick Train

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CA3 code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest mlflow scikit-learn

      - name: Run tests
        run: |
          pytest --tb=short || echo "No tests yet - OK for now"

      - name: Quick train & test model (smoke test)
        run: |
          python src/train.py --quick
